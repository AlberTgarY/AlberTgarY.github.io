:inherit;text-decoration:none}.echo-album:hover{text-decoration:underline}.echo-track{font-size:1.1rem;font-weight:500}.echo-controls{display:flex;gap:.5rem;margin-top:.5rem}.echo-btn{border:1px solid rgba(120,120,120,0.3);background:transparent;color:inherit;padding:.45rem .9rem;border-radius:999px;cursor:pointer;transition:all .2s ease}.echo-btn:hover{border-color:rgba(120,120,120,0.6);background:rgba(120,120,120,0.08)}.echo-primary{font-weight:600}.echo-list{margin-top:1.5rem;border-radius:12px;overflow:hidden;border:1px solid rgba(120,120,120,0.2)}.echo-item{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 1rem;border-bottom:1px solid rgba(120,120,120,0.12);background:rgba(255,255,255,0.55)}.echo-item:last-child{border-bottom:0}.echo-item button{border:0;background:0;font:inherit;color:inherit;text-align:left;cursor:pointer;flex:1}.echo-item span{opacity:.6;min-width:2ch}.echo-item.is-active{background:rgba(40,40,40,0.06)}@media(max-width:600px){.echo-card{grid-template-columns:1fr;text-align:center}.echo-cover{margin:0 auto}.echo-controls{justify-content:center}}</style> <script>
  const echoTracks = [
    {
      title: "Jasper JD7714",
      src: "/music/echorealm/AlbErt%20-%20Jasper%20JD7714.mp3",
    },
    {
      title: "Seviyor mu",
      src: "/music/echorealm/AlbErt%20-%20Seviyor%20mu.mp3",
    },
    {
      title: "Configurable - A",
      src: "/music/echorealm/AlbErt%20-%20Configurable%20-%20A.mp3",
    },
    {
      title: "Configurable - B",
      src: "/music/echorealm/AlbErt%20-%20Configurable%20-%20B.mp3",
    },
    {
      title: "Interlude - \"please take a seat\"",
      src: "/music/echorealm/AlbErt%20-%20Interlude%20-%20please%20take%20a%20seat.mp3",
    },
    {
      title: "SW1V 2LF",
      src: "/music/echorealm/AlbErt%20-%20SW1V%202LF.mp3",
    },
    {
      title: "Outro - \"Flauta Lunar\"",
      src: "/music/echorealm/AlbErt%20-%20Outro%20-%20Flauta%20Lunar.mp3",
    },
    {
      title: "Untitled-01",
      src: "/music/echorealm/AlbErt%20-%20Untitled-01.mp3",
    },
  ];

  const echoAudio = document.getElementById("echoAudio");
  const echoPlay = document.getElementById("echoPlay");
  const echoPrev = document.getElementById("echoPrev");
  const echoNext = document.getElementById("echoNext");
  const echoTrackTitle = document.getElementById("echoTrackTitle");
  const echoList = document.getElementById("echoList");

  let echoIndex = 0;

  function renderEchoList() {
    echoList.innerHTML = "";
    echoTracks.forEach((track, index) => {
      const item = document.createElement("div");
      item.className = "echo-item" + (index === echoIndex ? " is-active" : "");
      const number = document.createElement("span");
      number.textContent = String(index + 1).padStart(2, "0");
      const button = document.createElement("button");
      button.textContent = track.title;
      button.addEventListener("click", () => loadEchoTrack(index, true));
      item.appendChild(number);
      item.appendChild(button);
      echoList.appendChild(item);
    });
  }

  function loadEchoTrack(index, autoplay = false) {
    echoIndex = (index + echoTracks.length) % echoTracks.length;
    const track = echoTracks[echoIndex];
    echoAudio.src = track.src;
    echoTrackTitle.textContent = track.title;
    renderEchoList();
    if (autoplay) {
      echoAudio.play();
    }
  }

  echoPlay.addEventListener("click", () => {
    if (echoAudio.paused) {
      echoAudio.play();
    } else {
      echoAudio.pause();
    }
  });

  echoPrev.addEventListener("click", () => loadEchoTrack(echoIndex - 1, true));
  echoNext.addEventListener("click", () => loadEchoTrack(echoIndex + 1, true));

  echoAudio.addEventListener("play", () => (echoPlay.textContent = "Pause"));
  echoAudio.addEventListener("pause", () => (echoPlay.textContent = "Play"));
  echoAudio.addEventListener("ended", () => loadEchoTrack(echoIndex + 1, true));

  loadEchoTrack(0, false);
</script> </article> </div> </div> <footer class="fixed-bottom" role="contentinfo"> <div class="container mt-0"> © Copyright 2026 Yicheng (Albert) Zhan. </div> </footer> <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script> <script src="/assets/js/bootstrap.bundle.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js" integrity="sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha256-Nn1q/fx0H7SNLZMQ5Hw5JLaTRZp0yILA/FRexe19VdI=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js" integrity="sha256-htrLFfZJ6v5udOG+3kNLINIKh2gvoKqwEhHYfTTMICc=" crossorigin="anonymous"></script> <script defer src="/assets/js/masonry.js?a0db7e5d5c70cc3252b3138b0c91dcaf" type="text/javascript"></script> <script defer src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js" integrity="sha256-ZgMyDAIYDYGxbcpJcfUnYwNevG/xi9OHKaR/8GK+jWc=" crossorigin="anonymous"></script> <script defer src="/assets/js/zoom.js?85ddb88934d28b74e78031fd54cf8308"></script> <script src="/assets/js/no_defer.js?2781658a0a2b13ed609542042a859126"></script> <script defer src="/assets/js/common.js?e0514a05c5c95ac1a93a8dfd5249b92e"></script> <script defer src="/assets/js/copy_code.js?c8a01c11a92744d44b093fc3bda915df" type="text/javascript"></script> <script defer src="/assets/js/jupyter_new_tab.js?d9f17b6adc2311cbabd747f4538bb15f"></script> <script async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script> <script async src="https://badge.dimensions.ai/badge.js"></script> <script defer type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js" integrity="sha25
